seed: 42
run_name: mamba
output_dir: outputs/mamba

data:
  root: data/tinyshakespeare
  block_size: 256
  batch_size: 64
  num_workers: 0

model:
  name: mamba
  d_model: 256
  n_layer: 4
  d_state: 64
  d_conv: 4
  expand: 2
  dropout: 0.2
  tie_weights: true

train:
  max_epochs: 10
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  eval_interval: 200
  eval_batches: 50
  grad_clip: 1.0
  amp: true
  amp_dtype: bfloat16
  save_best_only: true
  early_stop_patience: 10
  early_stop_patience: 2    
  early_stop_min_delta: 0.001

system:
  device: cuda